replicaCount: 1
image:
  repository: ghcr.io/jtprogru/am-tg
  tag: "" # defaults to Chart.appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# Rendered verbatim into the sources.yaml ConfigMap. Keep tokens as ${VAR}
# references resolved from the environment (see `secrets` / `existingSecret`).
sources:
  defaults: {}
  #   bot_token: ${TG_BOT_TOKEN}
  sources: []
  #   - name: prod
  #     title: "Production"
  #     token: ${AM_TG_TOKEN_PROD}
  #     chat_id: -100123456789
# Mount the whole sources.yaml from an existing Secret (key: sources.yaml)
# instead of rendering the ConfigMap above. For teams that consider the
# routing config itself sensitive.
existingSourcesSecret: ""
# Name of an existing Secret whose keys are exposed as env vars
# (TG_BOT_TOKEN, AM_TG_TOKEN_PROD, ...) — the production path, works
# with ExternalSecrets / sealed-secrets.
existingSecret: ""
# Inline env secrets for dev/testing; rendered into a chart-managed Secret.
# Prefer existingSecret in production.
secrets: {}
#   TG_BOT_TOKEN: "123456:bot-token"
#   AM_TG_TOKEN_PROD: "long-random-token"

# Extra plain env vars
env: []
#   - name: AM_TG_LOG_LEVEL
#     value: DEBUG

service:
  type: ClusterIP
  port: 9119
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
