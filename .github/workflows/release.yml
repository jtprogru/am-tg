name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}
  CHART_REGISTRY: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pyproject.toml version $version" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Lint chart
        run: helm lint deploy/helm/am-tg

      - name: Package and push chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/am-tg --version "$version" --app-version "$version"
          helm push "am-tg-$version.tgz" "oci://${CHART_REGISTRY}"

  github-release:
    runs-on: ubuntu-latest
    needs: [docker, helm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping"
            exit 0
          fi
          cat > notes.md <<EOF
          ## Artifacts

          | Artifact | Location |
          |---|---|
          | Docker image (linux/amd64, linux/arm64) | \`${IMAGE}:${version}\` (also \`:${version%.*}\`, \`:latest\`) |
          | Helm chart | \`oci://${CHART_REGISTRY}/am-tg\` version \`${version}\` |

          ## Usage

          Pull the image:

          \`\`\`bash
          docker pull ${IMAGE}:${version}
          \`\`\`

          Install / upgrade with Helm:

          \`\`\`bash
          helm upgrade --install am-tg oci://${CHART_REGISTRY}/am-tg --version ${version} \\
            --set existingSecret=am-tg-tokens \\
            --values my-sources-values.yaml
          \`\`\`

          See the [README](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/README.md#deployment) for configuration details (sources file, secrets, Alertmanager receiver).

          EOF
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" -f tag_name="$GITHUB_REF_NAME" --jq .body >> notes.md
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file notes.md
