name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest -v --cov=am_tg --cov-report=term

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          cache: true

      - name: Scan dependencies and secrets
        run: make trivy-fs

      - name: Scan IaC (Dockerfile, compose, Helm chart)
        run: make trivy-config

      - name: Scan Docker image
        run: make trivy-image
