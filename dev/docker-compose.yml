# Local development stack: am-tg + Prometheus + Alertmanager + Grafana.
# This is an OVERRIDE on top of the root docker-compose.yml — the am-tg
# service itself (build, ports, healthcheck) is defined there; this file
# only adds dev-specific tweaks and the surrounding stack.
#
# Telegram API is replaced by a stub (tg-stub) so the full pipeline works
# without a real bot token: always-firing dev alert rules in Prometheus
# feed Alertmanager, which webhooks am-tg, which "sends" to the stub.
#
#   make dev-up      # docker compose -f docker-compose.yml -f dev/docker-compose.yml up
#   Grafana:      http://localhost:3000  (anonymous admin, dashboard provisioned)
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
#   am-tg:        http://localhost:9119

name: am-tg-dev

services:
  am-tg:
    environment:
      AM_TG_TELEGRAM_API_BASE: http://tg-stub
      AM_TG_LOG_LEVEL: DEBUG
    volumes:
      # Same container path as in the root file, so this mount replaces it
      - ./dev/am-tg/sources.yaml:/etc/am-tg/sources.yaml:ro
    depends_on:
      - tg-stub

  # Fake Telegram Bot API: answers 200 {"ok":true} to any sendMessage
  tg-stub:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./dev/tg-stub/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./dev/prometheus:/etc/prometheus:ro
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    volumes:
      - ./dev/alertmanager:/etc/alertmanager:ro
    ports:
      - "127.0.0.1:9093:9093"

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    volumes:
      - ./dev/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dev/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
